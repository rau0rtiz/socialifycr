    <meta name="twitter:title" content="Socialify — Dashboard de Marketing Digital" />
    <meta name="twitter:description" content="Gestiona redes sociales, campañas publicitarias y ventas desde un solo lugar." />
    <meta name="twitter:image" content="https://socialifycr.lovable.app/og-image.png" />
  </head>

  <body>
    <div id="root"></div>
    <script>
      (function () {
        var RETRY_KEY = '__lovable_module_retry_count__';
        var MAX_RETRIES = 4;
        var BOOT_TIMEOUT_MS = 4500;
        window.__lovableAppBooted = false;
        window.__lovableRecoveryInProgress = false;

        function readRetryCount() {
          try {
            return Number(window.sessionStorage.getItem(RETRY_KEY) || '0');
          } catch (_) {
            return 0;
          }
        }

        function writeRetryCount(count) {
          try {
            window.sessionStorage.setItem(RETRY_KEY, String(count));
          } catch (_) {}
        }

        function hasMountedApp() {
          var root = document.getElementById('root');
          return Boolean(
            window.__lovableAppBooted ||
              (root && (root.childElementCount > 0 || (root.textContent && root.textContent.trim())))
          );
        }

        function isModuleLoadError(event) {
          if (!event) return false;
          if (event.target && event.target.tagName === 'SCRIPT') return true;

          var parts = [];
          if (typeof event === 'string') {
            parts.push(event);
          } else {
            if (event.message) parts.push(event.message);
            if (event.filename) parts.push(event.filename);
            if (event.reason && event.reason.message) parts.push(event.reason.message);
            if (event.target && event.target.src) parts.push(event.target.src);
            if (event.target && event.target.href) parts.push(event.target.href);
          }

          return /Failed to fetch dynamically imported module|Importing a module script failed|error loading dynamically imported module|module script|Load failed/i.test(parts.join(' '));
        }

        function settleTasks(tasks) {
          return Promise.all(
            tasks.map(function (task) {
              return Promise.resolve(task).catch(function () {
                return undefined;
              });
            })
          );
        }

        function clearRuntimeCaches() {
          var tasks = [];

          if ('serviceWorker' in navigator && navigator.serviceWorker.getRegistrations) {
            tasks.push(
              navigator.serviceWorker.getRegistrations().then(function (registrations) {
                return settleTasks(
                  registrations.map(function (registration) {
                    return registration.unregister();
                  })
                );
              })
            );
          }

          if ('caches' in window && window.caches.keys) {
            tasks.push(
              window.caches.keys().then(function (keys) {
                return settleTasks(
                  keys.map(function (key) {
                    return window.caches.delete(key);
                  })
                );
              })
            );
          }

          return settleTasks(tasks);
        }

        function reloadWithCacheBust() {
          var url = new URL(window.location.href);
          url.searchParams.set('__reload', String(Date.now()));
          window.location.replace(url.toString());
        }

        function recoverFromModuleError() {
          if (window.__lovableRecoveryInProgress) return;
          window.__lovableRecoveryInProgress = true;

          var retryCount = readRetryCount();
          if (retryCount >= MAX_RETRIES) {
            reloadWithCacheBust();
            return;
          }

          writeRetryCount(retryCount + 1);

          clearRuntimeCaches()
            .catch(function () {
              return undefined;
            })
            .then(function () {
              return fetch(window.location.pathname + window.location.search, {
                cache: 'no-store',
                credentials: 'same-origin',
              }).catch(function () {
                return undefined;
              });
            })
            .then(function () {
              reloadWithCacheBust();
            });
        }

        window.addEventListener(
          'error',
          function (event) {
            if (isModuleLoadError(event)) {
              recoverFromModuleError();
            }
          },
          true
        );

        window.addEventListener('unhandledrejection', function (event) {
          if (isModuleLoadError(event.reason || event)) {
            if (event.preventDefault) event.preventDefault();
            recoverFromModuleError();
          }
        });

        window.addEventListener('vite:preloadError', function (event) {
          if (event.preventDefault) event.preventDefault();
          recoverFromModuleError();
        });

        window.setTimeout(function () {
          if (document.visibilityState === 'visible' && !hasMountedApp()) {
            recoverFromModuleError();
          }
        }, BOOT_TIMEOUT_MS);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
